<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>MARÍA OS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a1a1a'/%3E%3Cg fill='%23fff'%3E%3Crect x='2' y='4' width='2' height='2'/%3E%3Crect x='6' y='4' width='2' height='2'/%3E%3Crect x='10' y='4' width='2' height='2'/%3E%3Crect x='14' y='4' width='2' height='2'/%3E%3Crect x='18' y='4' width='2' height='2'/%3E%3Crect x='22' y='4' width='2' height='2'/%3E%3Crect x='26' y='4' width='2' height='2'/%3E%3Crect x='4' y='6' width='2' height='2'/%3E%3Crect x='8' y='6' width='2' height='2'/%3E%3Crect x='12' y='6' width='2' height='2'/%3E%3Crect x='16' y='6' width='2' height='2'/%3E%3Crect x='20' y='6' width='2' height='2'/%3E%3Crect x='24' y='6' width='2' height='2'/%3E%3Crect x='28' y='6' width='2' height='2'/%3E%3C/g%3E%3C/svg%3E">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* =====================
           THEME VARIABLES
           El CSS de cada theme viene de Notion.
           Este es el fallback por defecto.
        ===================== */
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: rgba(26, 26, 26, 0.95);
            --text-primary: #ffffff;
            --text-secondary: #1a1a1a;
            --accent-primary: #ffffff;
            --border-color: #1a1a1a;
        }

        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* =====================
           MENU BAR
        ===================== */
        .menu-bar {
            background: var(--accent-primary);
            color: var(--text-secondary);
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            position: relative;
            z-index: 10000;
            user-select: none;
        }

        .menu-bar .logo {
            font-weight: bold;
            margin-right: 20px;
            cursor: default;
        }

        .menu-bar .time {
            margin-left: auto;
        }

        .menu-bar .kaomoji {
            margin-left: auto;
            margin-right: 15px;
            font-size: 13px;
            cursor: pointer;
        }

        .taskbar {
            display: flex;
            gap: 8px;
            margin-left: 20px;
            flex: 1;
            overflow: hidden;
        }

        .taskbar-item {
            padding: 4px 12px;
            background: var(--accent-primary);
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            font-size: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Courier Prime', monospace;
        }

        .taskbar-item:hover {
            background: var(--text-secondary);
            color: var(--accent-primary);
        }

        /* =====================
           DESKTOP
        ===================== */
        .desktop {
            position: relative;
            height: calc(100vh - 30px);
            width: 100vw;
            background: var(--bg-primary);
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,.02) 2px,
                rgba(255,255,255,.02) 4px
            );
            overflow: hidden;
        }

        /* =====================
           LOADING STATE
        ===================== */
        .loading-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 5000;
        }

        .loading-text {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-primary);
            opacity: 0.6;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        .error-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .error-text {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-primary);
            opacity: 0.5;
            text-align: center;
            max-width: 400px;
            line-height: 1.8;
        }

        /* =====================
           DESKTOP ICONS
        ===================== */
        .icon {
            position: absolute;
            width: 100px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        .icon:hover { transform: scale(1.05); }
        .icon:active { transform: scale(0.98); }

        .icon-image {
            width: 80px;
            height: 80px;
            background: var(--accent-primary);
            border: 2px solid var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }

        .icon-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .icon-image canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .icon-label {
            font-size: 11px;
            text-align: center;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 4px 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            max-width: 100px;
            word-wrap: break-word;
            line-height: 1.3;
        }

        /* =====================
           WINDOWS
        ===================== */
        .window {
            position: absolute;
            background: var(--accent-primary);
            border: 3px solid var(--border-color);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
            min-width: 400px;
            min-height: 300px;
            display: none;
            flex-direction: column;
        }

        .window.active { display: flex; }

        .window.maximized {
            left: 0 !important;
            top: 30px !important;
            width: 100vw !important;
            height: calc(100vh - 30px) !important;
        }

        .window.minimized { display: none !important; }

        .window-title-bar {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
            border-bottom: 2px solid var(--accent-primary);
            flex-shrink: 0;
        }

        .window-title {
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-button {
            width: 16px;
            height: 16px;
            background: var(--accent-primary);
            border: 2px solid var(--accent-primary);
            cursor: pointer;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-weight: bold;
            transition: transform 0.1s;
        }

        .window-button:hover { transform: scale(1.1); }
        .window-button:active { transform: scale(0.9); }
        .window-button.minimize::before { content: '−'; }
        .window-button.maximize::before { content: '□'; }
        .window-button.close::before { content: '×'; }

        .window-content {
            flex: 1;
            background: var(--accent-primary);
            position: relative;
            overflow: hidden;
        }

        .window-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* =====================
           CONTEXT MENUS
        ===================== */
        .context-menu {
            position: fixed;
            background: var(--accent-primary);
            border: 2px solid var(--border-color);
            display: none;
            z-index: 20000;
            min-width: 160px;
        }

        .context-menu.active { display: block; }

        .context-menu-item {
            padding: 10px 15px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Courier Prime', monospace;
        }

        .context-menu-item:last-child { border-bottom: none; }

        .context-menu-item:hover {
            background: var(--text-secondary);
            color: var(--accent-primary);
        }

        /* =====================
           MODALS
        ===================== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-secondary);
            z-index: 25000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--accent-primary);
            border: 3px solid var(--border-color);
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .modal-section-label {
            display: block;
            color: var(--text-secondary);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            margin-top: 20px;
            opacity: 0.6;
        }

        /* Theme selector */
        .theme-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .theme-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            background: var(--accent-primary);
        }

        .theme-option:hover {
            background: var(--text-secondary);
            color: var(--accent-primary);
        }

        .theme-option.active {
            background: var(--text-secondary);
            color: var(--accent-primary);
        }

        .theme-swatch {
            width: 30px;
            height: 30px;
            border: 1px solid currentColor;
            flex-shrink: 0;
        }

        .theme-name {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: inherit;
        }

        .theme-option.active .theme-name { color: var(--accent-primary); }

        /* Kaomoji grid */
        .kaomoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .kaomoji-option {
            padding: 15px 8px;
            border: 2px solid var(--border-color);
            background: var(--accent-primary);
            color: var(--text-secondary);
            font-size: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .kaomoji-option:hover,
        .kaomoji-option.active {
            background: var(--text-secondary);
            color: var(--accent-primary);
        }

        .modal-button {
            padding: 12px 24px;
            border: 2px solid var(--border-color);
            background: var(--accent-primary);
            color: var(--text-secondary);
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            width: 100%;
        }

        .modal-button:hover {
            background: var(--text-secondary);
            color: var(--accent-primary);
        }

        /* =====================
           RESPONSIVE
        ===================== */
        @media (max-width: 600px) {
            .window {
                min-width: 90vw;
                min-height: 70vh;
            }

            .icon {
                width: 80px;
                height: 100px;
            }

            .icon-image {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- Menu Bar -->
    <div class="menu-bar" id="menuBar">
        <div class="logo">✧ MARÍA OS</div>
        <div class="taskbar" id="taskbar"></div>
        <div class="kaomoji" id="kaomojiBtn" title="Cambiar kaomoji">ฅ^•ﻌ•^ฅ</div>
        <div class="time" id="clock">00:00</div>
    </div>

    <!-- Desktop -->
    <div class="desktop" id="desktop">
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-text loading-dots">Cargando María OS</div>
        </div>
    </div>

    <!-- Context menu — icono -->
    <div class="context-menu" id="iconContextMenu">
        <div class="context-menu-item" id="ctxOpen">Abrir</div>
        <div class="context-menu-item" id="ctxNewTab">Abrir en nueva pestaña</div>
    </div>

    <!-- Context menu — escritorio -->
    <div class="context-menu" id="desktopContextMenu">
        <div class="context-menu-item" id="ctxThemes">Themes</div>
        <div class="context-menu-item" id="ctxReload">Recargar apps</div>
    </div>

    <!-- Modal — Themes -->
    <div class="modal" id="themesModal">
        <div class="modal-content">
            <h2>Themes</h2>
            <span class="modal-section-label">Selecciona un theme</span>
            <div class="theme-list" id="themeList">
                <div class="loading-text loading-dots" style="font-size:11px; opacity:0.5;">Cargando themes</div>
            </div>
            <button class="modal-button" id="themesClose">Cerrar</button>
        </div>
    </div>

    <!-- Modal — Kaomoji -->
    <div class="modal" id="kaomojiModal">
        <div class="modal-content">
            <h2>Kaomoji</h2>
            <div class="kaomoji-grid" id="kaomojiGrid"></div>
            <button class="modal-button" id="kaomojiClose">Cerrar</button>
        </div>
    </div>

    <script>
    // =============================================
    // CONFIGURACIÓN — sustituye estos valores
    // =============================================
    const WORKER_URL = 'https://maria-os.nostalgiasvg.workers.dev';
    const DB_APPS    = '361bacec543e8087a46fc14c98f33193';  // ID de la base de datos Apps
    const DB_THEMES  = '361bacec543e809c87a9c00e38b3a68e';  // ID de la base de datos Themes

    // =============================================
    // LOCALSTORAGE KEYS
    // =============================================
    const LS_THEME   = 'maria-os-theme';
    const LS_KAOMOJI = 'maria-os-kaomoji';

    // =============================================
    // KAOMOJI
    // =============================================
    const KAOMOJIS = [
        'ฅ^•ﻌ•^ฅ', '(•˕ •マ.ᐟ', '>^..^<', '₍^._.^₎ 𐒡',
        '/ᐠ_ ꞈ _ᐟ\\', '⋆𐙚₊˚⊹♡', '⋆౨ৎ˚⟡˖ ࣪', '꒰ᐢ. .ᐢ꒱₊˚⊹',
        '૮ ․ ․ ྀིა', '𐔌՞. .՞𐦯'
    ];

    // =============================================
    // STATE
    // =============================================
    let windows      = [];
    let windowZ      = 1000;
    let dragWin      = null;
    let dragOffset   = { x: 0, y: 0 };
    let activeIcon   = null;
    let themesData   = [];

    // =============================================
    // NOTION API
    // =============================================
    async function notionQuery(dbId) {
        const res = await fetch(`${WORKER_URL}/databases/${dbId}/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
    }

    async function notionPageBlocks(pageId) {
        const res = await fetch(`${WORKER_URL}/blocks/${pageId}/children`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
    }

    async function getPageCode(pageId) {
        try {
            const data = await notionPageBlocks(pageId);
            // Buscar bloques de tipo 'code' y concatenar su contenido
            const codeBlocks = data.results.filter(b => b.type === 'code');
            if (codeBlocks.length === 0) return null;
            return codeBlocks
                .map(b => b.code?.rich_text?.map(t => t.plain_text).join('') || '')
                .join('\n');
        } catch(e) {
            console.warn('No se pudo leer el código de la página:', e);
            return null;
        }
    }

    function getProp(page, name, type) {
        const prop = page.properties[name];
        if (!prop) return null;
        if (type === 'title')     return prop.title?.[0]?.plain_text || '';
        if (type === 'rich_text') return prop.rich_text?.[0]?.plain_text || '';
        if (type === 'checkbox')  return prop.checkbox || false;
        if (type === 'url')       return prop.url || '';
        return null;
    }

    // =============================================
    // DITHER
    // =============================================
    function hexToRgb(hex) {
        hex = hex.replace('#', '').trim();
        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        return {
            r: parseInt(hex.substring(0,2), 16),
            g: parseInt(hex.substring(2,4), 16),
            b: parseInt(hex.substring(4,6), 16)
        };
    }

    function ditherImage(img, w = 64, h = 64) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);

        const styles  = getComputedStyle(document.body);
        const darkRGB = hexToRgb(styles.getPropertyValue('--text-secondary').trim());
        const lightRGB= hexToRgb(styles.getPropertyValue('--accent-primary').trim());

        const imgData = ctx.getImageData(0, 0, w, h);
        const d = imgData.data;

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
                const useLight = gray > 128;
                const col = useLight ? lightRGB : darkRGB;
                const err = gray - (useLight ? 255 : 0);
                d[i] = col.r; d[i+1] = col.g; d[i+2] = col.b;

                const spread = [[x+1,y,7/16],[x-1,y+1,3/16],[x,y+1,5/16],[x+1,y+1,1/16]];
                spread.forEach(([nx,ny,f]) => {
                    if (nx>=0 && nx<w && ny>=0 && ny<h) {
                        const ni = (ny*w+nx)*4;
                        d[ni] += err*f; d[ni+1] += err*f; d[ni+2] += err*f;
                    }
                });
            }
        }
        ctx.putImageData(imgData, 0, 0);
        return canvas.toDataURL();
    }

    function ditheredTextIcon(text) {
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        const size   = 80;
        canvas.width = canvas.height = size;

        const styles   = getComputedStyle(document.body);
        const bgColor  = styles.getPropertyValue('--accent-primary').trim();
        const txtColor = styles.getPropertyValue('--text-secondary').trim();

        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = txtColor;
        for (let y = 0; y < size; y += 2)
            for (let x = 0; x < size; x += 4)
                ctx.fillRect(x + (y % 4), y, 2, 2);

        ctx.fillStyle = txtColor;
        ctx.font = 'bold 26px Courier';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, size/2, size/2);

        return canvas;
    }

    // =============================================
    // ICONS
    // =============================================
    function initials(name) {
        return name.split(/[-_ ]/).map(w => w[0] || '').join('').toUpperCase().slice(0, 3);
    }

    function createIcon(app, index) {
        const icon = document.createElement('div');
        icon.className = 'icon';
        // Posición en cuadrícula automática
        const col = index % 6;
        const row = Math.floor(index / 6);
        icon.style.left = (20 + col * 120) + 'px';
        icon.style.top  = (20 + row * 140) + 'px';

        const iconImg = document.createElement('div');
        iconImg.className = 'icon-image';

        const iconUrl = app.icono;
        if (iconUrl) {
            const img = document.createElement('img');
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                // Aplicar dither al cargar
                try {
                    const dithered = ditherImage(img, 72, 72);
                    const ditheredEl = document.createElement('img');
                    ditheredEl.src = dithered;
                    iconImg.innerHTML = '';
                    iconImg.appendChild(ditheredEl);
                } catch(e) {
                    // Si falla el dither (CORS), mostrar imagen original
                    iconImg.innerHTML = '';
                    iconImg.appendChild(img);
                }
            };
            img.onerror = () => {
                iconImg.appendChild(ditheredTextIcon(initials(app.nombre)));
            };
            img.src = iconUrl;
            iconImg.appendChild(ditheredTextIcon(initials(app.nombre))); // placeholder
        } else {
            iconImg.appendChild(ditheredTextIcon(initials(app.nombre)));
        }

        const label = document.createElement('div');
        label.className = 'icon-label';
        label.textContent = app.nombre;

        icon.appendChild(iconImg);
        icon.appendChild(label);

        // Doble clic — abrir app
        icon.addEventListener('dblclick', () => openWindow(app));

        // Clic derecho — menú contextual
        icon.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            activeIcon = app;
            showMenu('iconContextMenu', e.clientX, e.clientY);
        });

        return icon;
    }

    // =============================================
    // WINDOWS
    // =============================================
    function openWindow(app) {
        // Si ya existe, traer al frente
        const existing = windows.find(w => w.appId === app.id);
        if (existing) {
            existing.el.classList.remove('minimized');
            existing.el.style.zIndex = ++windowZ;
            updateTaskbar();
            return;
        }

        const win = document.createElement('div');
        win.className = 'window active';
        win.style.left   = (80 + windows.length * 30) + 'px';
        win.style.top    = (80 + windows.length * 30) + 'px';
        win.style.width  = '800px';
        win.style.height = '600px';
        win.style.zIndex = ++windowZ;

        // Title bar
        const bar = document.createElement('div');
        bar.className = 'window-title-bar';

        const title = document.createElement('div');
        title.className = 'window-title';
        title.textContent = app.nombre;

        const controls = document.createElement('div');
        controls.className = 'window-controls';

        const mkBtn = (cls, action) => {
            const btn = document.createElement('div');
            btn.className = `window-button ${cls}`;
            btn.addEventListener('click', action);
            return btn;
        };

        controls.appendChild(mkBtn('minimize', () => {
            win.classList.add('minimized');
            updateTaskbar();
        }));
        controls.appendChild(mkBtn('maximize', () => {
            win.classList.toggle('maximized');
        }));
        controls.appendChild(mkBtn('close', () => {
            win.remove();
            windows = windows.filter(w => w.el !== win);
            updateTaskbar();
        }));

        bar.appendChild(title);
        bar.appendChild(controls);

        // Content
        const content = document.createElement('div');
        content.className = 'window-content';

        // Cargar código HTML de la app en un iframe con srcdoc
        const iframe = document.createElement('iframe');
        iframe.sandbox = 'allow-scripts allow-forms allow-modals allow-popups';

        if (app.codigo) {
            const isBase64 = /^[A-Za-z0-9+\/]+=*$/.test(app.codigo.trim()) && !app.codigo.includes("<");
            try {
                iframe.srcdoc = isBase64 ? atob(app.codigo.trim()) : app.codigo;
            } catch(e) {
                iframe.srcdoc = app.codigo;
            }
        } else {
            iframe.srcdoc = `<p style="font-family:monospace;padding:20px;color:#666">Sin contenido</p>`;
        }

        content.appendChild(iframe);
        win.appendChild(bar);
        win.appendChild(content);

        // Drag
        bar.addEventListener('mousedown', (e) => {
            if (win.classList.contains('maximized')) return;
            dragWin = win;
            const rect = win.getBoundingClientRect();
            dragOffset = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            win.style.zIndex = ++windowZ;
        });

        win.addEventListener('mousedown', () => {
            win.style.zIndex = ++windowZ;
        });

        document.getElementById('desktop').appendChild(win);
        windows.push({ el: win, appId: app.id, app });
        updateTaskbar();
    }

    // =============================================
    // TASKBAR
    // =============================================
    function updateTaskbar() {
        const bar = document.getElementById('taskbar');
        bar.innerHTML = '';
        windows.forEach(w => {
            if (w.el.classList.contains('minimized')) {
                const item = document.createElement('div');
                item.className = 'taskbar-item';
                item.textContent = w.app.nombre;
                item.addEventListener('click', () => {
                    w.el.classList.remove('minimized');
                    w.el.style.zIndex = ++windowZ;
                    updateTaskbar();
                });
                bar.appendChild(item);
            }
        });
    }

    // =============================================
    // DRAG
    // =============================================
    document.addEventListener('mousemove', (e) => {
        if (!dragWin) return;
        dragWin.style.left = (e.clientX - dragOffset.x) + 'px';
        dragWin.style.top  = (e.clientY - dragOffset.y) + 'px';
    });

    document.addEventListener('mouseup', () => { dragWin = null; });

    // =============================================
    // CONTEXT MENUS
    // =============================================
    function showMenu(id, x, y) {
        hideAllMenus();
        const menu = document.getElementById(id);
        menu.style.left = x + 'px';
        menu.style.top  = y + 'px';
        menu.classList.add('active');
    }

    function hideAllMenus() {
        document.querySelectorAll('.context-menu').forEach(m => m.classList.remove('active'));
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.context-menu')) hideAllMenus();
    });

    // Icono — abrir
    document.getElementById('ctxOpen').addEventListener('click', () => {
        if (activeIcon) openWindow(activeIcon);
        hideAllMenus();
    });

    // Icono — nueva pestaña
    document.getElementById('ctxNewTab').addEventListener('click', () => {
        if (activeIcon?.url) window.open(activeIcon.url, '_blank');
        hideAllMenus();
    });

    // Escritorio — clic derecho
    document.getElementById('desktop').addEventListener('contextmenu', (e) => {
        if (e.target === document.getElementById('desktop') || e.target.classList.contains('desktop')) {
            e.preventDefault();
            showMenu('desktopContextMenu', e.clientX, e.clientY);
        }
    });

    // Escritorio — themes
    document.getElementById('ctxThemes').addEventListener('click', () => {
        hideAllMenus();
        openThemesModal();
    });

    // Escritorio — recargar
    document.getElementById('ctxReload').addEventListener('click', () => {
        hideAllMenus();
        loadApps();
    });

    // =============================================
    // THEMES
    // =============================================
    function applyThemeCSS(css) {
        let styleTag = document.getElementById('active-theme');
        if (!styleTag) {
            styleTag = document.createElement('style');
            styleTag.id = 'active-theme';
            document.head.appendChild(styleTag);
        }
        styleTag.textContent = css;
    }

    async function loadThemes() {
        try {
            const data = await notionQuery(DB_THEMES);
            themesData = data.results
                .filter(p => !getProp(p, 'Activo', 'checkbox') === false || true) // mostrar todos
                .map(p => ({
                    id:     p.id,
                    nombre: getProp(p, 'Nombre', 'title'),
                    css:    getProp(p, 'CSS', 'rich_text'),
                }))
                .filter(t => t.nombre);

            // Aplicar theme guardado
            const savedId = localStorage.getItem(LS_THEME);
            if (savedId) {
                const saved = themesData.find(t => t.id === savedId);
                if (saved?.css) applyThemeCSS(saved.css);
            }
        } catch(e) {
            console.warn('No se pudieron cargar los themes:', e);
        }
    }

    function openThemesModal() {
        const list = document.getElementById('themeList');
        list.innerHTML = '';

        const savedId = localStorage.getItem(LS_THEME);

        if (themesData.length === 0) {
            list.innerHTML = '<div class="loading-text" style="font-size:11px;opacity:0.5;">No hay themes disponibles</div>';
        }

        themesData.forEach(theme => {
            const opt = document.createElement('div');
            opt.className = 'theme-option' + (theme.id === savedId ? ' active' : '');

            const swatch = document.createElement('div');
            swatch.className = 'theme-swatch';

            // Extraer color de fondo del CSS para el swatch
            const bgMatch = theme.css?.match(/--bg-primary\s*:\s*([^;]+)/);
            const accentMatch = theme.css?.match(/--accent-primary\s*:\s*([^;]+)/);
            if (bgMatch && accentMatch) {
                swatch.style.background = `linear-gradient(135deg, ${bgMatch[1].trim()} 50%, ${accentMatch[1].trim()} 50%)`;
            }

            const name = document.createElement('div');
            name.className = 'theme-name';
            name.textContent = theme.nombre;

            opt.appendChild(swatch);
            opt.appendChild(name);

            opt.addEventListener('click', () => {
                if (theme.css) applyThemeCSS(theme.css);
                localStorage.setItem(LS_THEME, theme.id);
                document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });

            list.appendChild(opt);
        });

        // Opción reset
        const reset = document.createElement('div');
        reset.className = 'theme-option';
        reset.innerHTML = '<div class="theme-name">↩ Reset (default)</div>';
        reset.addEventListener('click', () => {
            const styleTag = document.getElementById('active-theme');
            if (styleTag) styleTag.textContent = '';
            localStorage.removeItem(LS_THEME);
            document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
            reset.classList.add('active');
        });
        list.appendChild(reset);

        document.getElementById('themesModal').classList.add('active');
    }

    document.getElementById('themesClose').addEventListener('click', () => {
        document.getElementById('themesModal').classList.remove('active');
    });

    // =============================================
    // KAOMOJI
    // =============================================
    document.getElementById('kaomojiBtn').addEventListener('click', () => {
        populateKaomojiGrid();
        document.getElementById('kaomojiModal').classList.add('active');
    });

    document.getElementById('kaomojiClose').addEventListener('click', () => {
        document.getElementById('kaomojiModal').classList.remove('active');
    });

    function populateKaomojiGrid() {
        const grid    = document.getElementById('kaomojiGrid');
        const current = document.getElementById('kaomojiBtn').textContent;
        grid.innerHTML = '';

        KAOMOJIS.forEach(k => {
            const opt = document.createElement('div');
            opt.className = 'kaomoji-option' + (k === current ? ' active' : '');
            opt.textContent = k;
            opt.addEventListener('click', () => {
                document.getElementById('kaomojiBtn').textContent = k;
                localStorage.setItem(LS_KAOMOJI, k);
                document.querySelectorAll('.kaomoji-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
            grid.appendChild(opt);
        });
    }

    // =============================================
    // LOAD APPS
    // =============================================
    async function loadApps() {
        const desktop = document.getElementById('desktop');

        // Limpiar iconos existentes (no el loading)
        desktop.querySelectorAll('.icon').forEach(i => i.remove());

        // Mostrar loading
        let loading = document.getElementById('loadingScreen');
        if (!loading) {
            loading = document.createElement('div');
            loading.id = 'loadingScreen';
            loading.className = 'loading-screen';
            loading.innerHTML = '<div class="loading-text loading-dots">Cargando apps</div>';
            desktop.appendChild(loading);
        }
        loading.style.display = 'flex';

        try {
            const data = await notionQuery(DB_APPS);

            const appsBase = data.results
                .filter(p => getProp(p, 'Activa', 'checkbox'))
                .map(p => ({
                    id:     p.id,
                    nombre: getProp(p, 'Nombre', 'title'),
                    icono:  getProp(p, 'Icono', 'rich_text'),
                    desc:   getProp(p, 'Descripción', 'rich_text'),
                }))
                .filter(a => a.nombre);

            // Cargar el código de cada app desde su página
            const apps = await Promise.all(appsBase.map(async app => ({
                ...app,
                codigo: await getPageCode(app.id)
            })));

            loading.style.display = 'none';

            if (apps.length === 0) {
                const msg = document.createElement('div');
                msg.className = 'error-screen';
                msg.innerHTML = '<div class="error-text">No hay apps activas.<br>Activa apps en Notion marcando el checkbox "Activa".</div>';
                desktop.appendChild(msg);
                return;
            }

            apps.forEach((app, i) => {
                desktop.appendChild(createIcon(app, i));
            });

        } catch(e) {
            loading.style.display = 'none';
            const err = document.createElement('div');
            err.className = 'error-screen';
            err.innerHTML = `<div class="error-text">No se pudo conectar con Notion.<br><small style="opacity:0.5">${e.message}</small></div>`;
            desktop.appendChild(err);
            console.error(e);
        }
    }

    // =============================================
    // CLOCK
    // =============================================
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('clock').textContent = `${h}:${m}`;
    }

    // =============================================
    // INIT
    // =============================================
    (function init() {
        // Kaomoji guardado
        const savedK = localStorage.getItem(LS_KAOMOJI);
        if (savedK) document.getElementById('kaomojiBtn').textContent = savedK;

        updateClock();
        setInterval(updateClock, 1000);

        // Cargar themes y apps en paralelo
        loadThemes();
        loadApps();
    })();
    </script>
</body>
</html>
